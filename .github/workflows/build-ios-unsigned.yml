name: Build iOS (unsigned IPA) # Run on every push to main + on demand (workflow_dispatch)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  # ----- project-specific knobs -----
  GODOT_VERSION: 4.4.1-stable # dont forget update export templates if bumping this version
  IOS_PRESET: iOS             # export-preset name in Godot
  NAME: ${{ github.event.repository.name }}
  # speed: stop brew from auto-updating every run
  HOMEBREW_NO_AUTO_UPDATE: 1

jobs:
  build-ios:
    runs-on: macos-14 # Apple Silicon runner w/ Xcode 16
    timeout-minutes: 30

    steps:
      # 0. Pull repo
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      # NEW STEP: Unzip your voxel game files before doing anything else
      - name: Unzip Project Files
        run: |
          unzip -q voxel-game-demo.zip

      # 1. Get headless Godot
      - name: Download Godot headless
        run: |
          curl -L \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_macos.universal.zip" \
            -o godot.zip
          unzip -q godot.zip -d godot

      # 2. Download and install official iOS export templates dynamically (FIXED DOT PATH)
      - name: Install iOS export template
        run: |
          templates_root="$HOME/Library/Application Support/Godot/export_templates/4.4.1.stable"
          mkdir -p "$templates_root"
          curl -L "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_export_templates.tpz" -o templates.zip
          unzip -q templates.zip
          cp templates/ios.zip "$templates_root/ios.zip"

      # 3. Export preset -> Xcode project (Clean relative directory)
      - name: Export to Xcode project
        run: |
          mkdir -p build/ios
          godot/Godot.app/Contents/MacOS/Godot --headless --path . \
            --export-release "${IOS_PRESET}" build/ios/${NAME}.xcodeproj

      # 4. Build unsigned archive
      - name: xcodebuild archive (unsigned)
        run: |
          xcodebuild archive \
            -project build/ios/${NAME}.xcodeproj \
            -scheme "${NAME}" \
            -archivePath build/ios/App.xcarchive \
            -configuration Release \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \


            | xcpretty

      # 5. Package .ipa
      - name: Package IPA
        run: |
          cd build/ios
          mkdir -p Payload
          cp -R App.xcarchive/Products/Applications/*.app Payload/
          zip -r "${NAME}.ipa" Payload
          mv "${NAME}.ipa" ../../

      # 6. Publish artifact
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa
          path: ${{ env.NAME }}.ipa
          retention-days: 14
